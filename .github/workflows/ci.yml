name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  api:
    name: API — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fymail-api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: fymail-api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true   # warn only in CI

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  # ── Frontend ──────────────────────────────────────────────────────────────────
  web:
    name: Web — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fymail-web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: fymail-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.fywarehouse.com/v1
